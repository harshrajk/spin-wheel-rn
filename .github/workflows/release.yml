name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Release
  id-token: write   # required for trusted publishing with npm

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Ensure Rollup native binary is present (npm optional deps bug workaround)
        if: runner.os == 'Linux'
        run: |
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          node -e "require.resolve('@rollup/rollup-linux-x64-gnu')" || npm i --no-save "@rollup/rollup-linux-x64-gnu@$ROLLUP_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents (dry-run pack)
        run: npm pack --dry-run

      # Ensure tag version matches package.json version (prevents accidental mismatch)
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to npm (using trusted publishing)
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
