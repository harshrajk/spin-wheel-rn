name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Ensure Rollup native binary is present (npm optional deps bug workaround)
        if: runner.os == 'Linux'
        run: |
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          node -e "require.resolve('@rollup/rollup-linux-x64-gnu')" || npm i --no-save "@rollup/rollup-linux-x64-gnu@$ROLLUP_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents (dry-run pack)
        run: npm pack --dry-run
